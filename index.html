<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#001f3f">
    <link rel="icon" href="favicon-2.png" type="image/png">
    <title>Homepage FyzzCareer</title>
</head>
<body>
    <div class="container">
        <img src="logo-login.png" alt="">
        <div class="load"></div>
        <p>loading....</p>
    </div>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #001F3F;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
        }

        .container img {
            width: 25vh;
            height: 17vh;
            filter: drop-shadow(0 0 5px white);
        }

        .load {
            border: 5px solid #f3f3f3; /* Light grey */
            border-top: 5px solid #3498db; /* Blue */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { 
                transform: rotate(0deg); 
            }
            100% { 
                transform: rotate(360deg); 
            }
        }

        /* ================= LAPTOP / DESKTOP ================= */
@media (min-width: 1024px) and (max-width: 1366px) {

    .container {
        padding: 30px;
    }

    .container img {
        width: 280px;
        height: auto;
    }

    .load {
        width: 55px;
        height: 55px;
        border: 6px solid #f3f3f3;
        border-top: 6px solid #3498db;
    }

    h1 {
        font-size: 38px;
    }

    p {
        font-size: 17px;
    }
}

    @media (max-width: 768px) {

    .container {
        padding: 20px;
    }

    .container img {
        width: 180px;
    }

    .load {
        width: 40px;
        height: 40px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #3498db;
    }

    h1 {
        font-size: 28px;
    }

    p {
        font-size: 14px;
    }
}
    </style>

    <script>
        setTimeout(function() {
            window.location.href = "homepage-2.html";
        }, 2000);
    </script>
</body>
</html>
